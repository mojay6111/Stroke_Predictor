{% extends "base.html" %}
{% block title %}Register — iStrokePredictor{% endblock %}

{% block content %}
<div class="page auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Join iStrokePredictor to track your health assessments</p>

    {% if message %}
      <div class="alert {% if 'successful' in message %}alert-success{% else %}alert-danger{% endif %}">
        {{ message }}
      </div>
    {% endif %}

    <form action="{{ url_for('register') }}" method="POST">
      <div class="form-group">
        <label class="form-label" for="name">Full name</label>
        <input type="text" class="form-control" id="name" name="name"
               placeholder="Your name" required autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="con_password">Confirm password</label>
          <input type="password" class="form-control" id="con_password" name="confirm_password"
                 placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">
        Create account →
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
